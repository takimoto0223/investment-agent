<text x="142" y="958" font-size="12" fill="#455a64">・確定：①②は (市場×戦略) の 1:1 ペアで解消。中長期は『バリュー』→『モメンタム×スイング』へロジックごと変更。</text>
<text x="142" y="981" font-size="12" fill="#455a64">・確定：実装は ScalpDayBase / MomentSwingBase の2基底＋市場差だけの _JP/_US サブクラス。</text>
<text x="142" y="1004" font-size="12" fill="#455a64">・確定(論点1/2)：全体リスクと資金配分は CIO に集約。FXRebalance は提言役。旧 DiscussionOrchestrator は廃止しCIOへ。</text>
<text x="142" y="1027" font-size="12" fill="#455a64">・確定：テック情報KB は株式4体で共有。マクロDB は FXRebalance が参照。ストアはインフラ(将来 RAG/ベクタDB)。</text>
<text x="142" y="1050" font-size="12" fill="#455a64">・確定：MarketContext を分離。観測層(macro_notes/セクター活動)=IntelScout、判断層(risk_level/rotation/配分)=CIO。</text>
<text x="142" y="1073" font-size="12" fill="#455a64">・確定：CIOは各ポッドに資金枠＋活性セクターを配分。セクター内を基本に選定し、出来高/値動き異常はカタリスト例外枠で拾う。</text>
<text x="142" y="1096" font-size="12" fill="#455a64">・確定：watchlist をセクタータグ付きに統一し活性セクターで動的フィルタ（JP/US固定リスト分裂を解消）。</text>
<text x="142" y="1119" font-size="12" fill="#455a64">・確定(論点3)：CXOはレポート/通知に専念。CIO/FX/Brokerの内部生成を廃し依存注入で③(神オブジェクト化)を解消。</text>
<text x="142" y="1142" font-size="12" fill="#455a64">・確定(論点4)：相互議論は軽い往復(承認＋1〜2回修正)から。自前BaseAgent継続、多ラウンド対話は安定後に後付け。</text>
